<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection System</title>
</head>

<body style="margin:0; font-family: Arial; background-color: #eef2f7;">

    <div style="text-align:center; padding-top: 100px;">

        <div style="background:white; padding:40px; border-radius:12px; 
                    display:inline-block; box-shadow:0 8px 20px rgba(0,0,0,0.1);">

            <h1 style="color:#2c3e50;">Fraud Detection System</h1>

            <p style="color:#555;">
                Upload beneficiary data to detect suspicious patterns
            </p>

            <form action="/upload" method="post" enctype="multipart/form-data">
                
                <input type="file" name="file" required style="margin:20px;"><br>

                <button type="submit" 
                        style="padding:12px 25px; background:#3498db; color:white; 
                               border:none; border-radius:6px; font-size:16px; cursor:pointer;">
                    Upload CSV
                </button>

            </form>

        </div>

    </div>

</body>
</html>
